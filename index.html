<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>InstaReelX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background: linear-gradient(135deg,#6a11cb,#ff3d77);
  color:white;
  text-align:center;
}

/* HEADER */
.header{
  background:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 30px;
}

.logo{
  font-weight:bold;
  font-size:18px;
  background:linear-gradient(45deg,#6a11cb,#ff3d77);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.header-right{
  color:#555;
  font-size:14px;
}

/* MAIN */
.hero{
  flex:1;
  padding:80px 20px;
}

.box{
  background:white;
  border-radius:12px;
  width:600px;
  max-width:90%;
  margin:30px auto;
  display:flex;
  padding:10px;
  gap:10px;
}

input{
  flex:1;
  padding:14px;
  border:none;
}

button{
  padding:12px;
  border:none;
  cursor:pointer;
  border-radius:8px;
}

.get{ background:#6a11cb;color:white; }
.paste{ background:#999;color:white; }

/* VIDEO */
video{
  width:400px;
  max-width:90%;
  margin-top:20px;
}

/* FOOTER */
.footer{
  background:#000;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">InstaReelX</div>
  <div class="header-right">Fast • Free • Secure</div>
</div>

<div class="hero">

<h1>Download Instagram Reels Instantly</h1>

<div class="box">
  <input id="url" placeholder="Paste Instagram link">

  <!-- 🔥 PASTE BUTTON -->
  <button class="paste" onclick="pasteLink()">Paste</button>

  <button class="get" onclick="getVideo()">Get</button>
</div>

<div id="preview" style="display:none;">
  <video id="video" controls></video>
  <br>
  <button onclick="downloadVideo()">Download</button>
</div>

</div>

<div class="footer">© InstaReelX</div>

<script>
let videoUrl = "";

/* PASTE */
async function pasteLink(){
  try{
    const text = await navigator.clipboard.readText();
    document.getElementById("url").value = text;
  }catch{
    alert("Clipboard allow karo");
  }
}

/* GET VIDEO (API BASED) */
async function getVideo(){
  const url = document.getElementById("url").value;

  if(!url){
    alert("Link paste karo");
    return;
  }

  try{
    const res = await fetch("https://api.ryzendesu.vip/api/downloader/instagram?url="+encodeURIComponent(url));
    const data = await res.json();

    videoUrl = data.data[0].url;

    document.getElementById("video").src = videoUrl;
    document.getElementById("preview").style.display = "block";

  }catch{
    alert("Failed to fetch video");
  }
}

/* DOWNLOAD */
function downloadVideo(){
  window.open(videoUrl);
}
</script>

</body>
</html>
