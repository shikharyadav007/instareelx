<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>InstaReelX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>InstaReelX</h2>

    <input
      type="text"
      id="urlInput"
      placeholder="Paste Instagram Reel URL"
    >

    <button onclick="getVideo()">GET</button>
  </div>

  <script>
    function getVideo() {
      const input = document.getElementById("urlInput");
      const url = input.value.trim();

      if (!url) {
        alert("Please enter Instagram URL");
        return;
      }

      // Backend call
      window.open(`/download-file?url=${encodeURIComponent(url)}`, "_blank");
    }
  </script>

</body>
</html>
