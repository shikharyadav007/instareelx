<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>InstaReelX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background: linear-gradient(135deg,#6a11cb,#ff3d77);
  color:white;
  text-align:center;
}

.header{
  background:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 30px;
}

.logo{
  font-weight:bold;
  font-size:18px;
  background:linear-gradient(45deg,#6a11cb,#ff3d77);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.header-right{
  color:#555;
}

.hero{
  flex:1;
  padding:80px 20px;
}

h1{
  font-size:42px;
}

.box{
  background:white;
  border-radius:12px;
  width:600px;
  max-width:90%;
  margin:30px auto;
  display:flex;
  padding:10px;
  gap:10px;
}

input{
  flex:1;
  padding:14px;
  border:none;
  outline:none;
}

button{
  padding:12px 18px;
  border:none;
  cursor:pointer;
  border-radius:8px;
}

.get{
  background:#6a11cb;
  color:white;
}

.paste{
  background:#ddd;
}

/* VIDEO */
video{
  width:400px;
  max-width:90%;
  margin-top:20px;
}

.download{
  margin-top:10px;
  background:#ff3d77;
  color:white;
}

/* BANNER */
.ad-box{
  margin:40px auto;
  width:728px;
  max-width:90%;
  height:90px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* BIG LOGO */
.big-logo{
  font-size:60px;
  margin-top:60px;
}

/* FOOTER */
.footer{
  background:#0a0a0a;
  padding:20px;
}
</style>

</head>

<body>

<div class="header">
  <div class="logo">InstaReelX</div>
  <div class="header-right">Fast • Free • Secure</div>
</div>

<div class="hero">

<h1>Download Instagram Reels Instantly</h1>

<div class="box">
  <input id="url" placeholder="Paste Instagram link">
  <button class="paste" onclick="pasteLink()">Paste</button>
  <button class="get" onclick="getVideo()">Get</button>
</div>

<!-- 🔥 BANNER 1 -->
<div class="ad-box">
<script>
  atOptions = {
    'key' : '5a390ab4cc4d9dedccdbfa3b01ab73c1',
    'format' : 'iframe',
    'height' : 90,
    'width' : 728
  };
</script>
<script src="https://www.highperformanceformat.com/5a390ab4cc4d9dedccdbfa3b01ab73c1/invoke.js"></script>
</div>

<div id="preview" style="display:none;">
  <video id="video" controls></video><br>
  <button class="download" onclick="downloadVideo()">Download</button>
</div>

<!-- 🔥 BANNER 2 -->
<div class="ad-box">
<script>
  atOptions = {
    'key' : '5a390ab4cc4d9dedccdbfa3b01ab73c1',
    'format' : 'iframe',
    'height' : 90,
    'width' : 728
  };
</script>
<script src="https://www.highperformanceformat.com/5a390ab4cc4d9dedccdbfa3b01ab73c1/invoke.js"></script>
</div>

<div class="big-logo">InstaReelX</div>

</div>

<div class="footer">
© 2026 InstaReelX
</div>

<script>
let currentUrl = "";

/* PASTE */
async function pasteLink(){
  try{
    const text = await navigator.clipboard.readText();
    document.getElementById("url").value = text;
  }catch{
    alert("Paste manually");
  }
}

/* GET VIDEO */
async function getVideo(){
  const url = document.getElementById("url").value;
  currentUrl = url;

  if(!url){
    alert("Link paste karo");
    return;
  }

  // popup ad (safe)
  window.open(
    "https://www.profitablecpmratenetwork.com/fa99i0p2ga?key=57d4d85402cc9e3c3b8a04dfe5e52181",
    "_blank",
    "width=400,height=600"
  );

  try{
    const res = await fetch("/get-video",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({url})
    });

    const data = await res.json();

    if(data.videoUrl){
      document.getElementById("video").src = data.videoUrl;
      document.getElementById("preview").style.display = "block";
    } else {
      alert("Video fetch failed");
    }

  }catch{
    alert("Server error");
  }
}

/* DOWNLOAD */
function downloadVideo(){
  window.open(currentUrl, "_blank");
}
</script>

</body>
</html>
